<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<div>
    <h1>Statistics</h1>
    <!-- Primera tabla -->
    <table class="table" border="2px" id="tablaUsuarios"> 
        <thead>
            <br>
            <tr>
            <th scope="col">Nombre</th>
            <th scope="col">Apellido</th>
            <th scope="col">Edad</th>
            <th scope="col">Curso</th>
            <th scope="col">Nivel</th>
            </tr>
            <br>
        </thead>
    <tbody>
    </tbody>
    </table>  
    <br>
    <h2>Frecuencia de Niveles</h2>
    <br>
    <!-- Segunda tabla -->
    <table class="table" border="2px">
    <thead>
        <tr>
        <th scope="col">Nivel</th>
        <th scope="col">Frecuencia Absoluta</th>
        <th scope="col">Frecuencia Acumulada</th>
        <th scope="col">Frecuencia Relativa</th>
        </tr>
    </thead>
        <tbody id="nivelesTabla">
        </tbody>
    </table>
</div>
<div>

    <h2>Frecuencia de Cursos</h2>

    <table class="table" border="2px">
        <thead>
            <tr>
                <th>Curso</th>
                <th>Frecuencia Absoluta</th>
                <th>Frecuencia Acumulada</th>
                <th>Frecuencia Relativa</th>
            </tr>
        </thead>

        <tbody id="tablaCursos">
        </tbody>

    </table>

</div>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
